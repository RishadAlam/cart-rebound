name: WordPress.org Deployment Dry Run

on:
    workflow_dispatch:
        inputs:
            ref:
                description: Git branch, tag, or commit to validate
                required: true
                default: main
                type: string

permissions:
    contents: read

concurrency:
    group: wordpress-org-dry-run-${{ inputs.ref }}
    cancel-in-progress: true

jobs:
    dry-run:
        name: Build and simulate deployment
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - name: Check out the selected ref
              uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
              with:
                  ref: ${{ inputs.ref }}
                  fetch-depth: 0
                  persist-credentials: false

            - name: Set up PHP
              uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
              with:
                  php-version: '8.2'
                  coverage: none
                  tools: composer:v2

            - name: Read and verify the plugin version
              id: version
              shell: bash
              run: |
                  version="$(php -r '
                      $data = json_decode(file_get_contents("package.json"), true, 512, JSON_THROW_ON_ERROR);
                      echo $data["version"] ?? "";
                  ')"
                  bash scripts/check-release-version.sh "v${version}"
                  echo "version=${version}" >> "${GITHUB_OUTPUT}"

            - name: Install Composer dependencies
              uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # 4.0.0
              with:
                  require-lock-file: true

            - name: Set up pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
              with:
                  run_install: false

            - name: Set up Node
              uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
              with:
                  node-version: 24
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Install JS dependencies
              run: pnpm install --frozen-lockfile

            - name: Run QA and build the distributable
              run: pnpm production-zip

            - name: Simulate the WordPress.org SVN deployment
              id: deploy
              uses: 10up/action-wordpress-plugin-deploy@54bd289b8525fd23a5c365ec369185f2966529c2 # 2.3.0
              with:
                  dry-run: true
                  generate-zip: true
              env:
                  SLUG: cart-rebound
                  VERSION: ${{ steps.version.outputs.version }}
                  BUILD_DIR: build/cart-rebound
                  ASSETS_DIR: .wordpress-org

            - name: Upload the simulated release ZIP
              uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
              with:
                  name: cart-rebound-${{ steps.version.outputs.version }}-dry-run
                  path: ${{ steps.deploy.outputs.zip-path }}
                  if-no-files-found: error
                  retention-days: 7
