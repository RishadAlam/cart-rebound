name: Plugin Check

on:
    push:
        branches: [main]
    pull_request:

permissions:
    contents: read

concurrency:
    group: plugin-check-${{ github.ref }}
    cancel-in-progress: true

jobs:
    plugin-check:
        name: WordPress Plugin Check
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
              with:
                  persist-credentials: false

            - name: Set up PHP
              uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
              with:
                  php-version: '8.2'
                  coverage: none
                  tools: composer:v2, wp-cli

            - name: Set up pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
              with:
                  run_install: false

            - name: Set up Node
              uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
              with:
                  node-version: 24
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Install JS dependencies
              run: pnpm install --frozen-lockfile

            - name: Build the distributable plugin
              run: bash scripts/build-zip.sh

            - name: Run Plugin Check on the built plugin
              uses: wordpress/plugin-check-action@98a1788320d0add90df2d8183934ecccbc4e05d2 # v1
              with:
                  build-dir: ./build/cart-rebound
