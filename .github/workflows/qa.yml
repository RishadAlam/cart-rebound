name: QA

on:
    push:
        branches: [main]
    pull_request:

permissions:
    contents: read

jobs:
    php:
        name: PHP QA (PHP ${{ matrix.php }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                php: ['7.4', '8.0', '8.1', '8.2', '8.3']
        steps:
            - uses: actions/checkout@v4

            - name: Set up PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php }}
                  coverage: none
                  tools: composer:v2

            - name: Install Composer dependencies
              uses: ramsey/composer-install@v3

            - name: Run the PHP quality gate
              run: composer qa

    js:
        name: JS QA
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up pnpm
              uses: pnpm/action-setup@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build assets
              run: pnpm run build

            - name: Run the JS quality gate
              run: pnpm run qa
