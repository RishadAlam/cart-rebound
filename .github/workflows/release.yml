name: Release
run-name: Deploy ${{ github.event.release.tag_name }} to WordPress.org

on:
    release:
        types: [published]

permissions: {}

concurrency:
    group: wordpress-org-release
    cancel-in-progress: false

jobs:
    build:
        name: Test and build
        if: ${{ github.event.release.prerelease == false }}
        runs-on: ubuntu-latest
        timeout-minutes: 30
        permissions:
            contents: read
        steps:
            - name: Check out the release tag
              uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
              with:
                  ref: ${{ github.event.release.tag_name }}
                  fetch-depth: 0
                  persist-credentials: false

            - name: Require the current main commit
              shell: bash
              run: |
                  git fetch origin main --depth=1
                  if [[ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]]; then
                      echo "The release tag must point to the current main commit." >&2
                      exit 1
                  fi

            - name: Set up PHP
              uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
              with:
                  php-version: '8.2'
                  coverage: none
                  tools: composer:v2, wp-cli

            - name: Verify release versions
              env:
                  RELEASE_TAG: ${{ github.event.release.tag_name }}
              run: bash scripts/check-release-version.sh "${RELEASE_TAG}"

            - name: Install Composer dependencies
              uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # 4.0.0
              with:
                  require-lock-file: true

            - name: Set up pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
              with:
                  run_install: false

            - name: Set up Node
              uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
              with:
                  node-version: 24
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Install JS dependencies
              run: pnpm install --frozen-lockfile

            - name: Run QA and build the distributable
              run: pnpm production-zip

            - name: Run WordPress Plugin Check
              uses: wordpress/plugin-check-action@98a1788320d0add90df2d8183934ecccbc4e05d2 # v1
              with:
                  build-dir: ./build/cart-rebound

            - name: Upload the verified plugin build
              uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
              with:
                  name: cart-rebound-plugin-build
                  path: build/cart-rebound.zip
                  if-no-files-found: error
                  retention-days: 7

    deploy:
        name: Deploy to WordPress.org
        needs: build
        runs-on: ubuntu-latest
        timeout-minutes: 15
        permissions:
            contents: read
        environment:
            name: wordpress-org
            url: https://wordpress.org/plugins/cart-rebound/
        steps:
            - name: Check out the release tag
              uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
              with:
                  ref: ${{ github.event.release.tag_name }}
                  fetch-depth: 0
                  persist-credentials: false

            - name: Reconfirm the current main commit
              shell: bash
              run: |
                  git fetch origin main --depth=1
                  if [[ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]]; then
                      echo "The release tag must point to the current main commit." >&2
                      exit 1
                  fi

            - name: Download the verified plugin build
              uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
              with:
                  name: cart-rebound-plugin-build
                  path: build-artifact

            - name: Unpack the verified plugin build
              shell: bash
              run: |
                  unzip -q build-artifact/cart-rebound.zip -d build
                  test -f build/cart-rebound/public/build/.vite/manifest.json
                  test -f build/cart-rebound/vendor/autoload.php

            - name: Deploy to WordPress.org SVN
              id: deploy
              uses: 10up/action-wordpress-plugin-deploy@54bd289b8525fd23a5c365ec369185f2966529c2 # 2.3.0
              with:
                  generate-zip: true
              env:
                  SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
                  SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
                  SLUG: cart-rebound
                  BUILD_DIR: build/cart-rebound
                  ASSETS_DIR: .wordpress-org

            - name: Preserve the deployed release ZIP
              uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
              with:
                  name: cart-rebound-release-zip
                  path: ${{ steps.deploy.outputs.zip-path }}
                  if-no-files-found: error
                  retention-days: 7

    publish:
        name: Publish the GitHub release
        needs: deploy
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: write
        steps:
            - name: Download the deployed release ZIP
              uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
              with:
                  name: cart-rebound-release-zip
                  path: release-artifact

            - name: Publish GitHub release
              uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
              env:
                  GITHUB_TOKEN: ${{ github.token }}
              with:
                  files: release-artifact/*.zip
                  fail_on_unmatched_files: true
                  tag_name: ${{ github.event.release.tag_name }}
