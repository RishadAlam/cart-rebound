<svg
	xmlns="http://www.w3.org/2000/svg"
	width="1544"
	height="500"
	viewBox="0 0 1544 500"
	font-family="Avenir Next, Avenir, Segoe UI, Arial, sans-serif"
>
	<defs>
		<linearGradient id="copy-safe" x1="0" y1="0" x2="1" y2="0">
			<stop offset="0" stop-color="#fbfaff" stop-opacity="0.98" />
			<stop offset="0.46" stop-color="#fbfaff" stop-opacity="0.9" />
			<stop offset="0.68" stop-color="#fbfaff" stop-opacity="0" />
		</linearGradient>
	</defs>

	<!-- Generated commerce-recovery artwork, cropped once for both banner sizes. -->
	<image href="banner-art.png" x="0" y="-59" width="1544" height="618" />
	<rect width="1100" height="500" fill="url(#copy-safe)" />

	<!-- Exact text remains vector-sharp and independent from the generated art. -->
	<text
		x="94"
		y="224"
		fill="#27143d"
		font-size="82"
		font-weight="750"
		letter-spacing="-3.2"
	>
		Cart Rebound
	</text>
	<text x="99" y="288" fill="#554c63" font-size="29" font-weight="500">
		Recover abandoned WooCommerce carts.
	</text>

	<!-- Compact, scan-friendly feature list. -->
	<g fill="#554c63" font-size="21" font-weight="600">
		<circle cx="105" cy="343" r="7" fill="#8b5cc3" />
		<text x="124" y="350">Guest Cart Capture</text>

		<circle cx="419" cy="343" r="7" fill="#8b5cc3" />
		<text x="438" y="350">Automated Recovery Emails</text>

		<circle cx="105" cy="399" r="7" fill="#8b5cc3" />
		<text x="124" y="406">Secure Recovery Links</text>

		<circle cx="419" cy="399" r="7" fill="#8b5cc3" />
		<text x="438" y="406">Exact Revenue Attribution</text>
	</g>
</svg>
